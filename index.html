<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Canonical domain: anything arriving on the old Render URL is sent to the
      // custom domain with the full path intact (portal links keep working).
      if (location.hostname === 'swnz-content.onrender.com') {
        location.replace('https://content.caddiedigital.co.nz' + location.pathname + location.search + location.hash)
      }
    </script>
    <link rel="icon" type="image/png" href="/assets/swnz-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Content</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

# Render Blueprint — deploys SWNZ Content as a static site.
# In Render: New → Blueprint → connect this repo. Render reads this file.
services:
  - type: web
    name: swnz-content
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    # SPA: serve index.html for any path so client-side state/routing works.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "20"
